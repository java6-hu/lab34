<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Please sign in</title>
</head>
<body>
    <h2>Please sign in</h2>
    <i th:text="${message}" style="color: red;"></i>
    
    <form th:action="@{/login/check}" method="post">
        <p>Username: <input name="username" type="text" placeholder="admin@gmail.com"></p>
        <p>Password: <input name="password" type="password"></p>
        <p><input name="remember-me" type="checkbox"> Remember me?</p>
        
        <p><button type="submit">Sign in</button></p>
        <a href="/oauth2/authorization/google" class="btn btn-danger">Đăng nhập bằng Google</a>
    </form>
</body>
</html>
