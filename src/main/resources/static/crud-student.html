<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Sinh Viên - CRUD REST API</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 30px;
        }
        
        h2 {
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
            text-align: center;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        
        .form-container {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border-left: 4px solid #667eea;
        }
        
        .form-group { 
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        label { 
            display: inline-block; 
            width: 140px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }
        
        input[type="text"] { 
            flex: 1;
            max-width: 300px;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
        }
        
        input[type="radio"] {
            cursor: pointer;
            margin-right: 5px;
        }
        
        .actions { 
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        
        button { 
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s;
            color: white;
        }
        
        button:first-child {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        button:first-child:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        button:nth-child(2) {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        
        button:nth-child(2):hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }
        
        button:nth-child(3) {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }
        
        button:nth-child(3):hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(250, 112, 154, 0.4);
        }
        
        button:nth-child(4) {
            background: #6c757d;
        }
        
        button:nth-child(4):hover {
            background: #5a6268;
            transform: translateY(-2px);
        }
        
        .table-container {
            overflow-x: auto;
        }
        
        table { 
            border-collapse: collapse; 
            width: 100%;
            margin-top: 20px;
        }
        
        th { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
            font-size: 14px;
        }
        
        td { 
            border-bottom: 1px solid #eee;
            padding: 12px 15px;
            font-size: 14px;
            color: #333;
        }
        
        tr:hover {
            background-color: #f8f9fa;
        }
        
        a { 
            text-decoration: none;
            color: #667eea;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        a:hover { 
            color: #764ba2;
            text-decoration: underline;
        }
        
        .action-links {
            display: flex;
            gap: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>📚 QUẢN LÝ SINH VIÊN</h2>

        <div class="form-container">
            <div class="form-group">
                <label>Id:</label>
                <input type="text" id="studentId">
            </div>
            <div class="form-group">
                <label>Full Name:</label>
                <input type="text" id="fullName">
            </div>
            <div class="form-group">
                <label>Average Mark:</label>
                <input type="text" id="mark">
            </div>
            <div class="form-group">
                <label>Gender:</label>
                <div class="radio-group">
                    <div>
                        <input type="radio" name="gender" id="genderMale" value="true" checked> Male
                    </div>
                    <div>
                        <input type="radio" name="gender" id="genderFemale" value="false"> Female
                    </div>
                </div>
            </div>

            <div class="actions">
                <button onclick="createStudent()">Create</button>
                <button onclick="updateStudent()">Update</button>
                <button onclick="deleteFromForm()">Delete</button>
                <button onclick="resetForm()">Reset</button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Name</th>
                        <th>Mark</th>
                        <th>Gender</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // 1. CẤU HÌNH API
        // *** HÃY THAY ĐỔI URL NÀY THÀNH URL FIREBASE CỦA BẠN ***
        const host = "https://java6-poly-ff5b2-default-rtdb.firebaseio.com";
        
        // Biến lưu trữ Key của Firebase khi chọn 1 sinh viên để Update/Delete
        let currentFirebaseKey = ""; 

        // 2. KHỞI ĐẦU: Tải và hiển thị danh sách
        function loadTableData() {
            axios.get(`${host}/students.json`)
                .then(resp => {
                    const data = resp.data;
                    const tbody = document.getElementById("tableBody");
                    tbody.innerHTML = ""; // Xóa dữ liệu cũ trên bảng

                    if (data) {
                        // Duyệt qua từng key trong object trả về từ Firebase
                        for (let key in data) {
                            let student = data[key];
                            let genderText = student.gender ? "Male" : "Female";
                            
                            // Tạo các thẻ tr, td tương ứng
                            let row = `<tr>
                                <td>${student.id}</td>
                                <td>${student.name}</td>
                                <td>${student.mark}</td>
                                <td>${genderText}</td>
                                <td>
                                    <div class="action-links">
                                        <a onclick="editStudent('${key}')">✏️ Edit</a>
                                        <a onclick="deleteStudent('${key}')">🗑️ Delete</a>
                                    </div>
                                </td>
                            </tr>`;
                            tbody.innerHTML += row;
                        }
                    }
                })
                .catch(error => console.error("Lỗi khi tải dữ liệu:", error));
        }

        // 3. EDIT CLICK: Tải thông tin sinh viên lên Form
        function editStudent(key) {
            axios.get(`${host}/students/${key}.json`)
                .then(resp => {
                    let student = resp.data;
                    // Đổ dữ liệu lên form
                    document.getElementById("studentId").value = student.id;
                    document.getElementById("fullName").value = student.name;
                    document.getElementById("mark").value = student.mark;
                    
                    if (student.gender === true || student.gender === "true") {
                        document.getElementById("genderMale").checked = true;
                    } else {
                        document.getElementById("genderFemale").checked = true;
                    }

                    // Lưu lại key để dùng cho Update và Delete
                    currentFirebaseKey = key; 
                })
                .catch(error => console.error("Lỗi khi lấy thông tin:", error));
        }

        // 4. CREATE CLICK: Thêm mới
        function createStudent() {
            let studentData = getFormData();
            axios.post(`${host}/students.json`, studentData)
                .then(resp => {
                    alert("Thêm mới thành công!");
                    resetForm();
                    loadTableData();
                })
                .catch(error => console.error("Lỗi khi thêm:", error));
        }

        // 5. UPDATE CLICK: Cập nhật
        function updateStudent() {
            if (!currentFirebaseKey) {
                alert("Vui lòng chọn (Edit) một sinh viên từ bảng trước khi cập nhật!");
                return;
            }
            let studentData = getFormData();
            axios.put(`${host}/students/${currentFirebaseKey}.json`, studentData)
                .then(resp => {
                    alert("Cập nhật thành công!");
                    loadTableData();
                })
                .catch(error => console.error("Lỗi khi cập nhật:", error));
        }

        // 6. DELETE CLICK (Từ nút trên Form hoặc nút trong Bảng)
        function deleteStudent(key) {
            if (confirm("Bạn có chắc chắn muốn xóa sinh viên này?")) {
                axios.delete(`${host}/students/${key}.json`)
                    .then(resp => {
                        resetForm();
                        loadTableData();
                    })
                    .catch(error => console.error("Lỗi khi xóa:", error));
            }
        }

        // Nút Delete trên form
        function deleteFromForm() {
            if (!currentFirebaseKey) {
                alert("Vui lòng chọn (Edit) một sinh viên từ bảng trước khi xóa!");
                return;
            }
            deleteStudent(currentFirebaseKey);
        }

        // 7. CÁC HÀM HỖ TRỢ (Xóa trắng form, Lấy dữ liệu từ form)
        function resetForm() {
            document.getElementById("studentId").value = "";
            document.getElementById("fullName").value = "";
            document.getElementById("mark").value = "";
            document.getElementById("genderMale").checked = true;
            currentFirebaseKey = ""; // Xóa key hiện tại
        }

        function getFormData() {
            return {
                id: document.getElementById("studentId").value,
                name: document.getElementById("fullName").value,
                mark: parseFloat(document.getElementById("mark").value),
                gender: document.getElementById("genderMale").checked
            };
        }

        // Gọi hàm tải dữ liệu ngay khi trang web vừa mở lên (Khởi đầu)
        loadTableData();

    </script>
</body>
</html>
