<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .user-info-section {
            padding: 20px;
        }
        .user-info-section h5 {
            color: #667eea;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .user-info-section ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .user-info-section li {
            padding: 10px 0;
            border-bottom: 1px solid #e9ecef;
        }
        .user-info-section li:last-child {
            border-bottom: none;
        }
        .user-info-section li b {
            color: #764ba2;
        }
        .btn-group-sm a {
            margin-right: 5px;
        }
        .badge-info {
            background-color: #667eea;
            display: inline-block;
            margin-top: 5px;
        }
        .alert-info {
            background-color: #e7f3ff;
            border: 1px solid #b3d9ff;
            color: #004085;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="user-info-section">
        <div th:switch="${@auth.authenticated}">
            <!-- User Authenticated Case -->
            <div th:case="true">
                <h5>
                    <i class="bi bi-person-circle"></i> Thông tin người dùng
                </h5>
                <ul>
                    <li>
                        <strong>Tên đăng nhập:</strong> 
                        <span class="badge badge-info" th:text="${@auth.username}"></span>
                    </li>
                    <li>
                        <strong>Quyền hạn:</strong> 
                        <span class="badge bg-success" th:text="${@auth.roles}"></span>
                    </li>
                    <li class="pt-3">
                        <a th:href="@{/logout}" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-box-arrow-right"></i> Đăng xuất
                        </a>
                        <a th:if="${@auth.hasAnyRole('ADMIN')}" href="#" class="btn btn-outline-primary btn-sm">
                            <i class="bi bi-gear"></i> Quản lý hệ thống
                        </a>
                    </li>
                </ul>
            </div>
            
            <!-- User Not Authenticated Case -->
            <div th:case="false">
                <div class="alert alert-info" role="alert">
                    <i class="bi bi-exclamation-circle"></i>
                    <strong>Thông báo:</strong> Bạn chưa đăng nhập vào hệ thống.
                </div>
                <h5>Tùy chọn đăng nhập:</h5>
                <ul>
                    <li>
                        <a th:href="@{/login/form}" class="btn btn-primary btn-sm">
                            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
